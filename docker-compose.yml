services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: business_cards
      POSTGRES_USER: business_cards
      POSTGRES_PASSWORD: business_cards
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U business_cards -d business_cards"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  # ── Django Backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: ./backend/.env
    environment:
      # Override DATABASE_URL to use Docker internal postgres service
      DATABASE_URL: postgres://business_cards:business_cards@postgres:5432/business_cards
      PORT: "8000"
    ports:
      - "8000:8000"
    volumes:
      # Persist uploaded media outside the container
      - ./backend/media:/app/media
      - ./backend/imports:/app/imports
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_network
    # Run migrations on every container start (safe with --run-syncdb)
    command: >
      sh -c "python manage.py migrate --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2 --timeout 120 --log-file -"

  # ── Next.js Frontend ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Next.js rewrites proxy /api/* to this URL from inside the Docker network.
        # "backend" resolves via Docker internal DNS to the backend service above.
        NEXT_PUBLIC_BACKEND_URL: http://backend:8000
        NEXT_PUBLIC_API_BASE_URL: /api
    env_file: ./frontend/.env.local
    environment:
      PORT: "3000"
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - app_network

volumes:
  postgres_data:

networks:
  app_network:
    driver: bridge
