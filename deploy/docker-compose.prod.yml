# ═══════════════════════════════════════════════════════════════════════════
# إعداد الإنتاج (Production) — نقل كامل للسيرفر عبر Nginx + HTTPS
# يُستخدم هكذا من داخل مجلد المشروع على السيرفر:
#   docker compose -f deploy/docker-compose.prod.yml up -d --build
#
# لا يعرّض هذا الملف أي منفذ للخارج سوى 80 و 443 (Nginx فقط).
# قاعدة البيانات والباك إند والفرونت إند تتواصل داخلياً عبر شبكة Docker.
# ═══════════════════════════════════════════════════════════════════════════

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-business_cards}
      POSTGRES_USER: ${POSTGRES_USER:-business_cards}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # منفذ محلي فقط (127.0.0.1) للطوارئ/الصيانة — غير مكشوف للإنترنت
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-business_cards} -d ${POSTGRES_DB:-business_cards}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  # ── Django Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ../backend/.env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-business_cards}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-business_cards}
      PORT: "8000"
    volumes:
      - ../backend/media:/app/media
      - ../backend/imports:/app/imports
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_network
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --threads 4 --worker-class gthread --timeout 300 --graceful-timeout 300 --log-file -"

  # ── Next.js Frontend ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BACKEND_URL: http://backend:8000
        NEXT_PUBLIC_API_BASE_URL: /api
    restart: unless-stopped
    env_file: ../frontend/.env.local
    environment:
      PORT: "3000"
    depends_on:
      - backend
    networks:
      - app_network

  # ── Nginx (البوابة الوحيدة للخارج + HTTPS) ────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      # يُستبدل داخل قالب nginx تلقائياً (envsubst)
      DOMAIN: ${DOMAIN:?set DOMAIN in .env}
    volumes:
      - ./nginx/app.conf.template:/etc/nginx/templates/app.conf.template:ro
      # الميديا (صور الكروت) تُخدَّم مباشرة من Nginx — أسرع وتعمل مع DEBUG=false
      - ../backend/media:/var/www/media:ro
      # ملفات Let's Encrypt
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    depends_on:
      - frontend
      - backend
    networks:
      - app_network

  # ── Certbot (تجديد شهادة SSL تلقائياً) ─────────────────────────────────────────
  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    # يحاول التجديد كل 12 ساعة (لا يجدّد فعلياً إلا عند اقتراب الانتهاء)
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  postgres_data:
  certbot_conf:
  certbot_www:

networks:
  app_network:
    driver: bridge
